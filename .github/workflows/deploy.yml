name: deploy

# Auto-deploy to Cloud Run after CI passes on main. Reuses the repo's cloudbuild.yaml, so the
# deploy is identical to the manual `scripts/deploy-*.sh` path.
#
# Auth: a service-account JSON key stored as the repo secret GCP_SA_KEY.
# One-time setup (UI or CLI): see scripts/setup-gha-deploy.sh. Then add:
#   - repo *secret*   GCP_SA_KEY      = the service-account JSON key
#   - repo *variable* GCP_PROJECT_ID  = your GCP project id
#   - repo *variable* AGENT_URL       = https://mnemos-agent.aryangorde.com  (optional; default below)
# Until GCP_PROJECT_ID is set, this workflow no-ops.

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
  workflow_dispatch:
    inputs:
      service:
        description: which service to deploy
        type: choice
        options: [web, agent, both]
        default: web

permissions:
  contents: read

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false   # never cancel an in-flight deploy

env:
  GCP_REGION: us-central1
  AGENT_URL_DEFAULT: https://mnemos-agent.aryangorde.com

jobs:
  deploy:
    name: build + deploy (Cloud Build → Cloud Run)
    runs-on: ubuntu-latest
    # Run only when configured AND either: a manual dispatch, or CI succeeded on a push to main.
    if: >-
      vars.GCP_PROJECT_ID != '' && (
        github.event_name == 'workflow_dispatch' || (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' &&
          github.event.workflow_run.event == 'push'
        )
      )
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: deploy web
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.service == 'web' || inputs.service == 'both' }}
        run: |
          gcloud builds submit . --config cloudbuild.yaml --region "$GCP_REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --substitutions=_TARGET=web,_REGION=$GCP_REGION,_AGENT_URL=${{ vars.AGENT_URL || env.AGENT_URL_DEFAULT }}

      - name: deploy agent (manual only)
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.service == 'agent' || inputs.service == 'both') }}
        run: |
          gcloud builds submit . --config cloudbuild.yaml --region "$GCP_REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --substitutions=_TARGET=agent,_REGION=$GCP_REGION
