name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-py:
    name: agent-py (python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: pip install -r apps/agent-py/requirements.txt
      - name: import check (app boots without credentials)
        run: PYTHONPATH=apps/agent-py python -c "import app.main; print('agent-py imports OK')"

  web-py:
    name: web-py (python)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: install
        run: pip install -r apps/web-py/requirements.txt
      - name: import check
        run: PYTHONPATH=apps/web-py python -c "import main; print('web-py imports OK')"

  docker:
    name: docker build (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [agent-py, web-py]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/agent-py/Dockerfile
          push: false
          tags: mnemos-agent:ci
      - name: build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-py/Dockerfile
          push: false
          tags: mnemos-web:ci
