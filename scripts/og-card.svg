<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0a08"/>
      <stop offset="100%" stop-color="#131210"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e84a35" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e84a35" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle left glow -->
  <rect x="0" y="0" width="600" height="630" fill="url(#glow)"/>

  <!-- Top-left vermilion accent bar -->
  <rect x="80" y="80" width="3" height="72" fill="#e84a35"/>

  <!-- Wordmark: M glyph -->
  <text x="104" y="148" font-family="Iowan Old Style, Baskerville, Georgia, serif" font-style="italic" font-size="80" fill="#f3ecdf" letter-spacing="-2">M</text>

  <!-- Product name -->
  <text x="160" y="148" font-family="Iowan Old Style, Baskerville, Georgia, serif" font-style="italic" font-size="80" fill="#f3ecdf" letter-spacing="-2">nemos</text>

  <!-- Hero line -->
  <text x="80" y="290" font-family="Iowan Old Style, Baskerville, Georgia, serif" font-style="italic" font-size="72" fill="#f3ecdf" letter-spacing="-1">The memory agent.</text>

  <!-- Vermilion underline under hero -->
  <rect x="80" y="308" width="520" height="3" fill="#e84a35"/>

  <!-- Sub-line -->
  <text x="80" y="380" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="28" fill="#8b7d6b" letter-spacing="0.5">Remembers what you forget — and acts on it.</text>

  <!-- Three capability tags -->
  <rect x="80" y="440" width="160" height="36" rx="4" fill="#1a1816"/>
  <text x="160" y="464" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" fill="#8b7d6b" letter-spacing="1">MEMORY</text>

  <rect x="256" y="440" width="160" height="36" rx="4" fill="#1a1816"/>
  <text x="336" y="464" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" fill="#8b7d6b" letter-spacing="1">REASONING</text>

  <rect x="432" y="440" width="160" height="36" rx="4" fill="#1a1816"/>
  <text x="512" y="464" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="16" fill="#8b7d6b" letter-spacing="1">ACTION</text>

  <!-- Bottom-right: made-with -->
  <text x="1120" y="570" text-anchor="end" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="14" fill="#3d3530" letter-spacing="0.5">Powered by Gemini + MongoDB</text>

  <!-- Decorative right: faint grid dots -->
  <g fill="#2a2520" opacity="0.6">
    <circle cx="800" cy="120" r="2"/><circle cx="840" cy="120" r="2"/><circle cx="880" cy="120" r="2"/><circle cx="920" cy="120" r="2"/><circle cx="960" cy="120" r="2"/><circle cx="1000" cy="120" r="2"/><circle cx="1040" cy="120" r="2"/><circle cx="1080" cy="120" r="2"/><circle cx="1120" cy="120" r="2"/>
    <circle cx="800" cy="160" r="2"/><circle cx="840" cy="160" r="2"/><circle cx="880" cy="160" r="2"/><circle cx="920" cy="160" r="2"/><circle cx="960" cy="160" r="2"/><circle cx="1000" cy="160" r="2"/><circle cx="1040" cy="160" r="2"/><circle cx="1080" cy="160" r="2"/><circle cx="1120" cy="160" r="2"/>
    <circle cx="800" cy="200" r="2"/><circle cx="840" cy="200" r="2"/><circle cx="880" cy="200" r="2"/><circle cx="920" cy="200" r="2"/><circle cx="960" cy="200" r="2"/><circle cx="1000" cy="200" r="2"/><circle cx="1040" cy="200" r="2"/><circle cx="1080" cy="200" r="2"/><circle cx="1120" cy="200" r="2"/>
    <circle cx="800" cy="240" r="2"/><circle cx="840" cy="240" r="2"/><circle cx="880" cy="240" r="2"/><circle cx="920" cy="240" r="2"/><circle cx="960" cy="240" r="2"/><circle cx="1000" cy="240" r="2"/><circle cx="1040" cy="240" r="2"/><circle cx="1080" cy="240" r="2"/><circle cx="1120" cy="240" r="2"/>
    <circle cx="800" cy="280" r="2"/><circle cx="840" cy="280" r="2"/><circle cx="880" cy="280" r="2"/><circle cx="920" cy="280" r="2"/><circle cx="960" cy="280" r="2"/><circle cx="1000" cy="280" r="2"/><circle cx="1040" cy="280" r="2"/><circle cx="1080" cy="280" r="2"/><circle cx="1120" cy="280" r="2"/>
    <circle cx="800" cy="320" r="2"/><circle cx="840" cy="320" r="2"/><circle cx="880" cy="320" r="2"/><circle cx="920" cy="320" r="2"/><circle cx="960" cy="320" r="2"/><circle cx="1000" cy="320" r="2"/><circle cx="1040" cy="320" r="2"/><circle cx="1080" cy="320" r="2"/><circle cx="1120" cy="320" r="2"/>
    <circle cx="800" cy="360" r="2"/><circle cx="840" cy="360" r="2"/><circle cx="880" cy="360" r="2"/><circle cx="920" cy="360" r="2"/><circle cx="960" cy="360" r="2"/><circle cx="1000" cy="360" r="2"/><circle cx="1040" cy="360" r="2"/><circle cx="1080" cy="360" r="2"/><circle cx="1120" cy="360" r="2"/>
    <circle cx="800" cy="400" r="2"/><circle cx="840" cy="400" r="2"/><circle cx="880" cy="400" r="2"/><circle cx="920" cy="400" r="2"/><circle cx="960" cy="400" r="2"/><circle cx="1000" cy="400" r="2"/><circle cx="1040" cy="400" r="2"/><circle cx="1080" cy="400" r="2"/><circle cx="1120" cy="400" r="2"/>
    <circle cx="800" cy="440" r="2"/><circle cx="840" cy="440" r="2"/><circle cx="880" cy="440" r="2"/><circle cx="920" cy="440" r="2"/><circle cx="960" cy="440" r="2"/><circle cx="1000" cy="440" r="2"/><circle cx="1040" cy="440" r="2"/><circle cx="1080" cy="440" r="2"/><circle cx="1120" cy="440" r="2"/>
    <circle cx="800" cy="480" r="2"/><circle cx="840" cy="480" r="2"/><circle cx="880" cy="480" r="2"/><circle cx="920" cy="480" r="2"/><circle cx="960" cy="480" r="2"/><circle cx="1000" cy="480" r="2"/><circle cx="1040" cy="480" r="2"/><circle cx="1080" cy="480" r="2"/><circle cx="1120" cy="480" r="2"/>
    <circle cx="800" cy="520" r="2"/><circle cx="840" cy="520" r="2"/><circle cx="880" cy="520" r="2"/><circle cx="920" cy="520" r="2"/><circle cx="960" cy="520" r="2"/><circle cx="1000" cy="520" r="2"/><circle cx="1040" cy="520" r="2"/><circle cx="1080" cy="520" r="2"/><circle cx="1120" cy="520" r="2"/>
  </g>

  <!-- Vermilion dot accent (top-right) -->
  <circle cx="1100" cy="80" r="6" fill="#e84a35" opacity="0.8"/>
</svg>
