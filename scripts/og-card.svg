<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Mnemos-III palette: deep umber base + vermilion atmospheric haze -->
    <radialGradient id="haze" cx="50%" cy="-5%" r="60%">
      <stop offset="0%" stop-color="#f25738" stop-opacity="0.22"/>
      <stop offset="35%" stop-color="#f25738" stop-opacity="0.06"/>
      <stop offset="80%" stop-color="#0e0a05" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14100a"/>
      <stop offset="60%" stop-color="#0e0a05"/>
      <stop offset="100%" stop-color="#050402"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="url(#vfade)"/>
  <!-- Top vermilion haze (matches mnemos.aryangorde.com hero atmosphere) -->
  <rect width="1200" height="630" fill="url(#haze)"/>

  <!-- Constellation field — subtle, hints at the canvas without dominating -->
  <g fill="#f3ecdf" opacity="0.55">
    <circle cx="180" cy="120" r="1.4"/>
    <circle cx="260" cy="80"  r="0.9"/>
    <circle cx="340" cy="160" r="1.8"/>
    <circle cx="420" cy="110" r="1.1"/>
    <circle cx="540" cy="60"  r="2.0"/>
    <circle cx="640" cy="130" r="1.2"/>
    <circle cx="720" cy="90"  r="0.8"/>
    <circle cx="820" cy="170" r="1.6"/>
    <circle cx="900" cy="100" r="1.0"/>
    <circle cx="1000" cy="150" r="1.3"/>
    <circle cx="1080" cy="80" r="0.7"/>
    <circle cx="120" cy="220" r="1.0"/>
    <circle cx="220" cy="280" r="0.6"/>
    <circle cx="700" cy="230" r="0.9"/>
    <circle cx="980" cy="270" r="1.4"/>
  </g>
  <!-- Constellation hairlines — connect a few stars -->
  <g stroke="#6c645a" stroke-width="0.5" opacity="0.4" fill="none">
    <line x1="340" y1="160" x2="420" y2="110"/>
    <line x1="420" y1="110" x2="540" y2="60"/>
    <line x1="640" y1="130" x2="540" y2="60"/>
    <line x1="640" y1="130" x2="720" y2="90"/>
    <line x1="820" y1="170" x2="900" y2="100"/>
    <line x1="900" y1="100" x2="1000" y2="150"/>
  </g>
  <!-- One vermilion reasoning trace through the constellation -->
  <g stroke="#f25738" stroke-width="1.2" fill="none" opacity="0.85">
    <line x1="180" y1="120" x2="340" y2="160"/>
    <line x1="340" y1="160" x2="540" y2="60"/>
    <line x1="540" y1="60"  x2="720" y2="90"/>
  </g>
  <circle cx="720" cy="90" r="3" fill="#f25738"/>
  <circle cx="720" cy="90" r="9" fill="none" stroke="#f25738" stroke-width="0.6" opacity="0.5"/>

  <!-- Top-left vermilion kicker rule -->
  <rect x="80" y="312" width="32" height="1.5" fill="#f25738"/>
  <text x="124" y="318" font-family="IBM Plex Mono, monospace" font-size="13" font-weight="500"
        fill="#9c9486" letter-spacing="2.4">── MNEMOS · THE MEMORY AGENT</text>

  <!-- Hero headline -->
  <text x="80" y="408" font-family="Iowan Old Style, Baskerville, Georgia, serif"
        font-size="78" fill="#f3ecdf" letter-spacing="-1.4">Your professional memory,</text>
  <text x="80" y="488" font-family="Iowan Old Style, Baskerville, Georgia, serif"
        font-style="italic" font-size="78" fill="#f25738" letter-spacing="-1.4">made navigable.</text>

  <!-- Sub-paragraph -->
  <text x="80" y="538" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-weight="300" font-size="20" fill="#d8d2c5" letter-spacing="0">Hybrid retrieval. A Critic agent that audits the draft. Memory as a graph.</text>

  <!-- Four tile glyphs along the bottom — ❡ ◆ ✎ ⌗ -->
  <g font-family="Iowan Old Style, Baskerville, Georgia, serif" font-style="italic"
     font-size="22" fill="#6c645a" letter-spacing="20">
    <text x="80" y="595">❡  ◆  ✎  ⌗</text>
  </g>

  <!-- Bottom-right URL -->
  <text x="1120" y="595" text-anchor="end" font-family="IBM Plex Mono, monospace"
        font-size="13" fill="#6c645a" letter-spacing="0.5">mnemos.aryangorde.com</text>

  <!-- Vermilion accent dot at top-right (pulse-dot from the design) -->
  <circle cx="1100" cy="80" r="6" fill="#f25738"/>
  <circle cx="1100" cy="80" r="10" fill="none" stroke="#f25738" stroke-width="0.6" opacity="0.45"/>
</svg>
